<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #17202a; }
      .panel-title { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #17202a; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #52657a; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #52657a; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #52657a; }
      .bold { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #17202a; }
      .drug-title { font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; }
      .drug-text { font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .card-text { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #52657a; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #c0392b; }
      .panel { fill: #fbfcfc; stroke: #d0d3d4; stroke-width: 2; }
      .leader { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .mem-dark { fill: #566573; }
      .mem-light { fill: #d5dbdb; }
      .cleft { fill: #f5f7f8; }
      .pre { fill: #eaeded; stroke: #7b7d7d; stroke-width: 2.5; }
      .ach-stroke { stroke: #b57f00; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .ach-fill { fill: #f7dc6f; stroke: #b57f00; stroke-width: 1.8; }
      .enzyme { fill: #fdebd0; stroke: #d68910; stroke-width: 2.5; }
      .green { fill: #239b56; }
      .purple { fill: #7d3c98; }
      .teal { fill: #117a65; }
      .red { fill: #c0392b; }
      .blue-stroke { stroke: #2e86c1; }
      .green-stroke { stroke: #239b56; }
      .purple-stroke { stroke: #7d3c98; }
      .orange-stroke { stroke: #d68910; }
      .red-stroke { stroke: #c0392b; }
      .site { stroke: #ffffff; stroke-width: 2; }
    </style>

    <marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#d68910"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#239b56"/>
    </marker>
    <marker id="arrow-purple" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#7d3c98"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#117a65"/>
    </marker>
    <marker id="block-red" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M6,0 L6,12" stroke="#c0392b" stroke-width="3"/>
    </marker>

    <symbol id="ach-molecule" viewBox="0 0 120 55">
      <circle cx="20" cy="28" r="11" class="ach-fill"/>
      <text x="20" y="33" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#7d6608">N+</text>
      <path d="M31 28 L54 28 L67 16" class="ach-stroke"/>
      <path d="M67 16 L86 16" class="ach-stroke"/>
      <path d="M67 16 L67 32" class="ach-stroke"/>
      <text x="88" y="21" font-family="Arial" font-size="12" fill="#7d6608">O</text>
      <text x="64" y="46" font-family="Arial" font-size="12" fill="#7d6608">O</text>
      <path d="M98 16 L113 25" class="ach-stroke"/>
    </symbol>

    <symbol id="neo-icon" viewBox="0 0 130 62">
      <path d="M28 10 L57 10 L72 35 L57 60 L28 60 L13 35 Z" fill="#d5f5e3" stroke="#239b56" stroke-width="4"/>
      <path d="M72 35 L96 35" stroke="#239b56" stroke-width="4" stroke-linecap="round"/>
      <text x="106" y="31" font-family="Arial" font-size="15" fill="#239b56">NO</text>
      <text x="126" y="25" font-family="Arial" font-size="10" fill="#239b56">2</text>
      <circle cx="44" cy="35" r="4" fill="#239b56"/>
    </symbol>

    <symbol id="spinosyn-icon" viewBox="0 0 130 70">
      <path d="M18 39 C18 16, 46 5, 70 13 C99 23, 112 48, 94 62 C72 80, 18 67, 18 39 Z" fill="#eadcf2" stroke="#7d3c98" stroke-width="4"/>
      <circle cx="35" cy="30" r="7" fill="#7d3c98"/>
      <circle cx="70" cy="20" r="6" fill="#7d3c98"/>
      <circle cx="91" cy="49" r="6" fill="#7d3c98"/>
      <path d="M42 52 L58 40 L77 48" stroke="#7d3c98" stroke-width="4" fill="none" stroke-linecap="round"/>
    </symbol>

    <symbol id="op-carbamate-icon" viewBox="0 0 145 70">
      <circle cx="42" cy="35" r="22" fill="#fadbd8" stroke="#c0392b" stroke-width="4"/>
      <text x="42" y="41" text-anchor="middle" font-family="Arial" font-size="17" font-weight="700" fill="#c0392b">P</text>
      <path d="M64 35 L94 35 M94 20 L94 50 M94 35 L122 24 M94 35 L122 46" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/>
      <text x="126" y="28" font-family="Arial" font-size="13" fill="#c0392b">O</text>
      <text x="126" y="51" font-family="Arial" font-size="13" fill="#c0392b">N</text>
    </symbol>

    <symbol id="ache-pocket" viewBox="0 0 160 76">
      <path d="M19 36 C19 13, 48 5, 80 8 C117 11, 146 24, 142 47 C137 73, 89 72, 57 66 C32 61, 19 53, 19 36 Z" class="enzyme"/>
      <path d="M53 42 C69 32, 92 32, 108 42" fill="none" stroke="#d68910" stroke-width="4" stroke-linecap="round"/>
      <text x="80" y="50" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#7d6608">AChE</text>
    </symbol>

    <symbol id="nAChR" viewBox="0 0 220 300">
      <path d="M105 20 C67 25, 44 69, 49 138 C53 205, 72 266, 105 280 Z" fill="#d6eaf8" stroke="#2e86c1" stroke-width="4"/>
      <path d="M115 20 C153 25, 176 69, 171 138 C167 205, 148 266, 115 280 Z" fill="#d6eaf8" stroke="#2e86c1" stroke-width="4"/>
      <path d="M74 53 C48 77, 41 139, 62 178 C78 209, 99 202, 104 163 L105 45 C96 45, 84 46, 74 53 Z" fill="#d6eaf8" stroke="#2e86c1" stroke-width="4"/>
      <path d="M146 53 C172 77, 179 139, 158 178 C142 209, 121 202, 116 163 L115 45 C124 45, 136 46, 146 53 Z" fill="#d6eaf8" stroke="#2e86c1" stroke-width="4"/>
      <path d="M110 35 L110 288" stroke="#117a65" stroke-width="14" stroke-linecap="round"/>
      <path d="M110 45 L110 285" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
      <circle cx="75" cy="55" r="18" class="green site"/>
      <circle cx="145" cy="55" r="18" class="green site"/>
      <circle cx="170" cy="190" r="22" class="purple site"/>
      <text x="110" y="72" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#2e86c1">nAChR</text>
      <text x="154" y="147" font-family="Arial" font-size="15" fill="#7d3c98">alpha6</text>
    </symbol>

    <symbol id="splice-icon" viewBox="0 0 110 80">
      <path d="M12 61 C28 3, 38 3, 52 61 C66 3, 78 3, 94 61" fill="none" stroke="#2e86c1" stroke-width="8" stroke-linecap="round"/>
      <circle cx="12" cy="61" r="9" fill="#2e86c1"/>
      <circle cx="97" cy="13" r="9" fill="#2e86c1"/>
    </symbol>

    <symbol id="stop-icon" viewBox="0 0 110 90">
      <path d="M38 7 L72 7 L101 36 L101 54 L72 83 L38 83 L9 54 L9 36 Z" fill="#c0392b"/>
      <text x="55" y="51" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#ffffff">STOP</text>
    </symbol>

    <symbol id="tm4-icon" viewBox="0 0 110 90">
      <rect x="25" y="22" width="10" height="54" fill="#7d3c98"/>
      <rect x="45" y="22" width="10" height="54" fill="#d7bde2"/>
      <rect x="65" y="22" width="10" height="54" fill="#d7bde2"/>
      <rect x="85" y="22" width="10" height="54" fill="#7d3c98"/>
      <path d="M34 13 L90 13" stroke="#c0392b" stroke-width="5"/>
      <text x="62" y="10" text-anchor="middle" font-family="Arial" font-size="13" fill="#c0392b">del</text>
    </symbol>
  </defs>

  <rect width="1800" height="1100" fill="#ffffff"/>
  <text x="900" y="48" text-anchor="middle" class="title">Figure 2. Cholinergic synapse targets and Pxalpha6-associated spinosyn resistance</text>

  <rect x="35" y="80" width="1195" height="980" rx="28" class="panel"/>
  <rect x="1270" y="80" width="495" height="980" rx="28" class="panel"/>
  <text x="75" y="145" class="panel-title">Cholinergic synapse mode of action</text>
  <text x="1310" y="145" class="panel-title">Pxalpha6-associated evidence</text>

  <!-- Presynaptic terminal -->
  <path d="M128 270 C128 190, 190 155, 270 155 L615 155 C695 155, 735 198, 735 268 L735 348 C735 428, 678 463, 592 463 L270 463 C190 463, 128 424, 128 344 Z" class="pre"/>
  <text x="440" y="210" text-anchor="middle" class="label">presynaptic terminal</text>

  <g transform="translate(330 280)">
    <circle cx="0" cy="0" r="39" fill="#f9e79f" stroke="#b7950b" stroke-width="3"/>
    <use href="#ach-molecule" x="-32" y="-15" width="66" height="30"/>
  </g>
  <g transform="translate(462 323)">
    <circle cx="0" cy="0" r="39" fill="#f9e79f" stroke="#b7950b" stroke-width="3"/>
    <use href="#ach-molecule" x="-34" y="-13" width="68" height="31"/>
  </g>
  <g transform="translate(594 255)">
    <circle cx="0" cy="0" r="39" fill="#f9e79f" stroke="#b7950b" stroke-width="3"/>
    <use href="#ach-molecule" x="-33" y="-16" width="68" height="31"/>
  </g>
  <g transform="translate(672 318)">
    <circle cx="0" cy="0" r="39" fill="#f9e79f" stroke="#b7950b" stroke-width="3"/>
    <use href="#ach-molecule" x="-33" y="-15" width="68" height="31"/>
  </g>
  <text x="286" y="420" class="small" fill="#7d6608">ACh vesicles</text>

  <!-- Synaptic cleft and ACh movement -->
  <path d="M360 463 C365 520, 372 567, 382 619" class="leader orange-stroke" marker-end="url(#arrow-orange)"/>
  <path d="M500 463 C500 520, 496 567, 490 618" class="leader orange-stroke" marker-end="url(#arrow-orange)"/>
  <path d="M645 463 C662 515, 678 563, 690 620" class="leader orange-stroke" marker-end="url(#arrow-orange)"/>

  <rect x="145" y="632" width="975" height="288" class="cleft"/>
  <text x="180" y="685" class="label">synaptic cleft</text>

  <use href="#ach-molecule" x="310" y="730" width="96" height="44"/>
  <use href="#ach-molecule" x="450" y="690" width="96" height="44"/>
  <use href="#ach-molecule" x="585" y="765" width="96" height="44"/>
  <use href="#ach-molecule" x="790" y="720" width="86" height="40"/>
  <text x="812" y="704" class="tiny" fill="#7d6608">ACh</text>

  <use href="#ache-pocket" x="285" y="835" width="150" height="72"/>
  <use href="#ache-pocket" x="498" y="850" width="150" height="72"/>
  <use href="#ache-pocket" x="710" y="835" width="150" height="72"/>
  <path d="M510 820 L615 820" stroke="#d68910" stroke-width="2.4" marker-end="url(#arrow-orange)"/>
  <text x="555" y="810" text-anchor="middle" font-family="Arial" font-size="14" fill="#7d6608">hydrolysis</text>
  <text x="615" y="814" class="tiny" fill="#7d6608">choline + acetate</text>

  <!-- Postsynaptic membrane and receptor -->
  <rect x="145" y="920" width="975" height="48" class="mem-dark"/>
  <rect x="145" y="968" width="975" height="64" class="mem-light"/>
  <text x="632" y="915" text-anchor="middle" class="label">postsynaptic membrane</text>
  <use href="#nAChR" x="820" y="690" width="230" height="312"/>
  <path d="M935 742 L935 1030" class="leader" stroke="#117a65" marker-end="url(#arrow-teal)"/>
  <text x="1036" y="925" class="label" fill="#117a65">Na<tspan baseline-shift="super" font-size="10">+</tspan> / Ca<tspan baseline-shift="super" font-size="10">2+</tspan> influx</text>

  <!-- Drug callouts -->
  <rect x="760" y="150" width="390" height="110" rx="18" fill="#d5f5e3" stroke="#239b56" stroke-width="3"/>
  <use href="#neo-icon" x="790" y="174" width="100" height="50"/>
  <text x="995" y="190" text-anchor="middle" class="drug-title" fill="#239b56">Neonicotinoids</text>
  <text x="995" y="222" text-anchor="middle" class="drug-text" fill="#239b56">orthosteric / near-orthosteric</text>
  <text x="995" y="241" text-anchor="middle" class="drug-text" fill="#239b56">ACh-binding site</text>
  <path d="M935 260 C934 390, 928 545, 910 756" class="leader green-stroke" marker-end="url(#arrow-green)"/>

  <rect x="720" y="478" width="430" height="104" rx="18" fill="#eadcf2" stroke="#7d3c98" stroke-width="3"/>
  <use href="#spinosyn-icon" x="748" y="503" width="92" height="54"/>
  <text x="995" y="516" text-anchor="middle" class="drug-title" fill="#7d3c98">Spinosyns</text>
  <text x="995" y="550" text-anchor="middle" class="drug-text" fill="#7d3c98">allosteric site linked to alpha6</text>
  <path d="M958 582 L958 835" class="leader purple-stroke" marker-end="url(#arrow-purple)"/>

  <rect x="170" y="585" width="330" height="104" rx="18" fill="#fadbd8" stroke="#c0392b" stroke-width="3"/>
  <use href="#op-carbamate-icon" x="185" y="605" width="130" height="64"/>
  <text x="365" y="622" text-anchor="middle" class="drug-title" fill="#c0392b">Organophosphates / carbamates</text>
  <text x="365" y="653" text-anchor="middle" class="drug-text" fill="#c0392b">inhibit AChE</text>
  <path d="M360 688 C356 755, 355 815, 358 855" class="leader red-stroke" marker-end="url(#block-red)"/>

  <!-- ACh activation label -->
  <path d="M765 705 C818 716, 855 738, 887 760" class="leader orange-stroke" marker-end="url(#arrow-orange)"/>
  <text x="690" y="698" class="tiny" fill="#7d6608">ACh activates receptor</text>

  <!-- Right evidence cards -->
  <rect x="1310" y="250" width="390" height="150" rx="18" fill="#ffffff" stroke="#bfc9ca" stroke-width="2.5"/>
  <use href="#splice-icon" x="1345" y="290" width="90" height="70"/>
  <text x="1460" y="298" class="bold">mis-spliced transcripts</text>
  <text x="1460" y="342" class="card-text">aberrant exon joining / loss of</text>
  <text x="1460" y="365" class="card-text">full-length alpha6</text>

  <rect x="1310" y="468" width="390" height="150" rx="18" fill="#ffffff" stroke="#bfc9ca" stroke-width="2.5"/>
  <use href="#stop-icon" x="1345" y="498" width="90" height="80"/>
  <text x="1460" y="520" class="bold">premature stop codons</text>
  <text x="1460" y="564" class="card-text">truncated receptor subunits reduce</text>
  <text x="1460" y="587" class="card-text">functional target</text>

  <rect x="1310" y="686" width="390" height="150" rx="18" fill="#ffffff" stroke="#bfc9ca" stroke-width="2.5"/>
  <use href="#tm4-icon" x="1345" y="716" width="90" height="80"/>
  <text x="1460" y="736" class="bold">TM4 three-amino-acid</text>
  <text x="1460" y="759" class="bold">deletion</text>
  <text x="1460" y="803" class="card-text">transmembrane deletion linked to</text>
  <text x="1460" y="826" class="card-text">high spinosad resistance</text>

  <rect x="1310" y="910" width="390" height="80" rx="16" fill="#f7f9f9" stroke="#85929e" stroke-width="2.5"/>
  <text x="1335" y="942" class="bold">Note</text>
  <text x="1415" y="934" class="note">Strong evidence for spinosyn resistance;</text>
  <text x="1415" y="957" class="note">do not generalize alpha6 evidence to all nAChR insecticides.</text>
</svg>
